AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless AI Document Pipeline - S3, Lambda, DynamoDB, and SSM

Globals:
  Function:
    Timeout: 60
    MemorySize: 256
    Runtime: python3.9
    Environment:
      Variables:
        OPENAI_API_KEY_PARAM: "/docupipeline/openai_api_key"

Resources:
  # 1. S3 Buckets
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: ['PUT', 'POST', 'GET']
            AllowedOrigins: ['*'] # In production, restrict to your frontend domain
            MaxAge: 3000

  CleanTextBucket:
    Type: AWS::S3::Bucket

  # 2. DynamoDB Table
  MetadataTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: document_id
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  # 3. Lambda: Generate Presigned URL
  GeneratePresignedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/presign/
      Handler: app.lambda_handler
      Environment:
        Variables:
          UPLOAD_BUCKET: !Ref UploadBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: "arn:aws:s3:::*"
      Events:
        GetUrl:
          Type: Api
          Properties:
            Path: /presigned-url
            Method: get

  # 4. Lambda: Text Extractor (Triggered by UploadBucket)
  TextExtractorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/extractor/
      Handler: app.lambda_handler
      Environment:
        Variables:
          CLEAN_TEXT_BUCKET: !Ref CleanTextBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: "arn:aws:s3:::*"
      Events:
        NewUploadEvent:
          Type: S3
          Properties:
            Bucket: !Ref UploadBucket
            Events: s3:ObjectCreated:*
            Filter:
              Filters:
                - Name: suffix
                  Value: .pdf

  # 5. Lambda: AI Summarizer (Triggered by CleanTextBucket)
  AISummarizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/summarizer/
      Handler: app.lambda_handler
      Environment:
        Variables:
          METADATA_TABLE: !Ref MetadataTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: "arn:aws:s3:::*"
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Scan
                - dynamodb:Query
              Resource: !GetAtt MetadataTable.Arn
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/docupipeline/openai_api_key"
      Events:
        NewTextEvent:
          Type: S3
          Properties:
            Bucket: !Ref CleanTextBucket
            Events: s3:ObjectCreated:*
            Filter:
              Filters:
                - Name: suffix
                  Value: .txt

  # 6. Lambda: Get Document Status (Triggered by API Gateway GET)
  GetDocumentStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/status/
      Handler: app.lambda_handler
      Environment:
        Variables:
          METADATA_TABLE: !Ref MetadataTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Scan
                - dynamodb:Query
              Resource: !GetAtt MetadataTable.Arn
      Events:
        GetStatus:
          Type: Api
          Properties:
            Path: /documents/{id}
            Method: get

Outputs:
  ApiEndpoint:
    Description: "HTTP API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  UploadBucketName:
    Description: "Name of the S3 upload bucket"
    Value: !Ref UploadBucket
  CleanTextBucketName:
    Description: "Name of the S3 clean text bucket"
    Value: !Ref CleanTextBucket
  MetadataTableName:
    Description: "Name of the DynamoDB metadata table"
    Value: !Ref MetadataTable
